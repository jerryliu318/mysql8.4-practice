services:
  mysql80:
    image: mysql:8.0
    container_name: mysql80_fsync_check
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3380:3306"
    command: 
      - --innodb-flush-method=fsync
      - --innodb-use-fdatasync=ON

  mysql84:
    image: mysql:8.4
    container_name: mysql84_odirect_check
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3384:3306"
    command: --innodb-flush-method=O_DIRECT

  sysbench:
    build:
      context: .
      dockerfile: Dockerfile.sysbench
    container_name: sysbench_runner
    depends_on:
      - mysql80
      - mysql84
